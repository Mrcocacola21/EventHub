[pytest]
DJANGO_SETTINGS_MODULE = config.settings.test
python_files = tests.py test_*.py *_tests.py
testpaths = apps
addopts = -ra --strict-markers --reuse-db
markers =
    unit: unit tests
    api: API tests
    service: service layer tests
    permissions: permissions tests
    transactions: transaction/concurrency tests
    slow: slow tests
    websocket: channels websocket tests
    celery: celery task tests
    cache: cache tests
